name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

  release-web:
    name: Package web release
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: cartulary-web
      - run: |
          cd cartulary-web
          zip -r ../cartulary-web.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: cartulary-web.zip
          generate_release_notes: true
          make_latest: true

  build-tauri:
    name: Tauri (${{ matrix.os }})
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_pattern: bundle/**
            bundle_name: cartulary-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle_pattern: bundle/**
            bundle_name: cartulary-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_pattern: bundle/**
            bundle_name: cartulary-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_pattern: bundle/**
            bundle_name: cartulary-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle artifacts
        run: find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || echo "No bundle directory"
        shell: bash

      - name: Upload all bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_name }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.bundle_pattern }}
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          generate_release_notes: false
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
